name: Check junior program pages

on:
  schedule:
    - cron: "17 13 * * *"   # daily ~9:17 AM ET
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: check-programs
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Run program watcher
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          POKE_API_KEY: ${{ secrets.POKE_API_KEY }}
        run: python check_programs.py

      - name: Commit state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/
          git diff --cached --quiet || (git commit -m "Update program state" && git pull --rebase && git push)
