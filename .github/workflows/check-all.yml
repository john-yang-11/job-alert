name: Check internships

# One consolidated job: repo watchers + direct company boards, in a single
# checkout/setup/pip with one state commit. Board fetches run concurrently (see
# check_companies.py). Runs every 30 min, offset (:07/:37) from the priority
# workflow's quarter-hours to avoid overlapping state commits. Consolidating into
# one job (vs several) keeps run count -- and Actions minutes -- low.
on:
  schedule:
    - cron: "7,37 * * * *"   # every 30 min
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: check-internships
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run checkers
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          POKE_API_KEY: ${{ secrets.POKE_API_KEY }}
          WATCHLIST_CSV_URL: ${{ secrets.WATCHLIST_CSV_URL }}
          BUFFER_URL: ${{ secrets.BUFFER_URL }}
          BUFFER_TOKEN: ${{ secrets.BUFFER_TOKEN }}
        run: |
          python check.py || echo "::warning::check.py failed"
          python check_companies.py || echo "::warning::check_companies.py failed"

      - name: Commit state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/
          git diff --cached --quiet || (git commit -m "Update state" && git pull --rebase && git push)
