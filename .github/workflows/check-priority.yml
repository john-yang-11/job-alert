name: Check priority companies

on:
  schedule:
    - cron: "*/10 * * * *"   # every 10 min — fast lane for priority.txt companies
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: check-priority
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Run priority board checker
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          POKE_API_KEY: ${{ secrets.POKE_API_KEY }}
          WATCHLIST_CSV_URL: ${{ secrets.WATCHLIST_CSV_URL }}
          BUFFER_URL: ${{ secrets.BUFFER_URL }}
          BUFFER_TOKEN: ${{ secrets.BUFFER_TOKEN }}
        run: python check_companies.py --priority

      - name: Commit state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/
          git diff --cached --quiet || (git commit -m "Update priority board state" && git pull --rebase && git push)
